name: test

on:
  workflow_dispatch:
  pull_request:
  workflow_call:

jobs:
  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Docker info
        run: |
          docker version
          docker compose version

      # for the golden image comparison in scripts/test.sh
      - name: Install ImageMagick
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends imagemagick

      - name: Run tests
        run: ./scripts/test.sh
